<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ashoo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&family=Manrope:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div class="background-grid" aria-hidden="true"></div>
        <div class="orb orb-left" aria-hidden="true"></div>
        <div class="orb orb-right" aria-hidden="true"></div>
        <div class="maintenance-screen" role="status" aria-live="polite">
            <div class="maintenance-card">
                <div class="card-body">
                    <div class="logo-mark">
                        <img src="1.jpg" alt="Логотип Ashoo" loading="lazy" width="120" height="120">
                    </div>
                    <h1><span>Технические<br>работы</span></h1>
                    <p class="lead">Мини-приложение Ashoo временно недоступно. Мы обновляем сервис, чтобы вы получили ещё более красивый и удобный опыт.</p>
                    <p class="hint">Попробуйте заглянуть позже или свяжитесь с оператором, если нужно оформить модель прямо сейчас.</p>
                    <a class="support-chip" href="https://t.me/SuppAshoo" target="_blank" rel="noopener noreferrer">
                        Связаться с поддержкой
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
